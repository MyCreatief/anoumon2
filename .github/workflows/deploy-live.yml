name: Deploy Live

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-live
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Lint theme PHP
        run: |
          find app/public/wp-content/themes/anoumon -type f -name "*.php" -print0 | while IFS= read -r -d '' file; do
            php -l "$file"
          done

      - name: Install deploy tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy theme and fonts via SFTP
        env:
          LIVE_SFTP_HOST: ${{ secrets.LIVE_SFTP_HOST }}
          LIVE_SFTP_PORT: ${{ secrets.LIVE_SFTP_PORT }}
          LIVE_SFTP_USERNAME: ${{ secrets.LIVE_SFTP_USERNAME }}
          LIVE_SFTP_PASSWORD: ${{ secrets.LIVE_SFTP_PASSWORD }}
        run: |
          set -euo pipefail

          lftp -u "$LIVE_SFTP_USERNAME","$LIVE_SFTP_PASSWORD" -p "$LIVE_SFTP_PORT" "sftp://$LIVE_SFTP_HOST" <<'LFTP'
          set sftp:auto-confirm yes
          set net:max-retries 2
          set net:timeout 20
          mirror -R --delete --verbose \
            --exclude-glob .git/ \
            --exclude-glob node_modules/ \
            --exclude-glob '*.zip' \
            --exclude-glob '.DS_Store' \
            app/public/wp-content/themes/anoumon /anoumon/wp-content/themes/anoumon
          mirror -R --delete --verbose \
            --exclude-glob .git/ \
            --exclude-glob '.DS_Store' \
            app/public/wp-content/fonts /anoumon/wp-content/fonts
          LFTP
